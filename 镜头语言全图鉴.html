
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>镜头语言全图鉴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans SC',sans-serif;background:#f5f5f8;color:#1a1a2e;min-height:100vh;overflow-x:hidden}

  /* Header */
  .header{text-align:center;padding:48px 20px 12px}
  .header h1{font-size:40px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:8px}
  .header .subtitle{font-size:15px;color:#555;font-weight:300;letter-spacing:2px}

  /* Layout */
  .layout{display:flex;max-width:1440px;margin:0 auto}
  .sidebar{width:240px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid #eee;padding:20px 0;background:#fafafa;font-size:13px}
  .sidebar::-webkit-scrollbar{width:3px}
  .sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
  .content{flex:1;min-width:0;padding-bottom:60px}

  .sb-part{padding:16px 16px 4px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#aaa}
  .sb-link{display:block;padding:6px 16px 6px 28px;color:#888;text-decoration:none;cursor:pointer;border-left:2px solid transparent;transition:all .15s;font-size:12.5px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-link:hover{color:#333;background:rgba(0,0,0,.03)}
  .sb-link.active{color:#7c3aed;border-left-color:#7c3aed;background:rgba(124,58,237,.04);font-weight:500}
  .sb-sub{padding-left:40px;font-size:11.5px;color:#aaa}
  .sb-sub:hover{color:#666}
  .sb-sub.active{color:#7c3aed;border-left-color:#7c3aed;background:rgba(124,58,237,.04)}

  /* Part header */
  .part{padding:40px 20px 20px}
  .part-header{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .part-num{font-size:13px;font-weight:700;color:#aaa;padding:3px 10px;border:1px solid #ddd;border-radius:4px;letter-spacing:1px}
  .part-title{font-size:26px;font-weight:900;letter-spacing:2px}
  .part-desc{font-size:13px;color:#555;margin-bottom:32px;padding-left:2px}

  /* Section (category) */
  .section{padding:0 20px 24px}
  .section-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;transition:background .2s}
  .section-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .section-title{font-size:18px;font-weight:700;letter-spacing:1px}
  .section-subtitle{font-size:12px;color:#555;font-weight:300;margin-left:6px}
  .section-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;margin-left:auto;white-space:nowrap}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;padding:12px 0 20px}
  .card{background:#fff;border:1px solid #eaeaf0;border-radius:12px;padding:18px;transition:all .3s;cursor:default;position:relative;overflow:hidden;display:flex;flex-direction:column}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;opacity:.8}
  .card:hover{border-color:#d0d0da;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.06)}
  .card-name{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
  .card-name-en{font-size:11px;color:#999;margin-bottom:8px}
  .card-desc{font-size:12.5px;color:#666;line-height:1.7;margin-bottom:10px}
  .card-example{font-size:12px;color:#666;line-height:1.6;padding:8px 10px;background:#f8f8fb;border-radius:6px;border-left:3px solid #e0e0e8;margin-bottom:10px}
  .card-example strong{color:#888}
  .card-extra{font-size:11px;line-height:1.6;padding:6px 9px;border-radius:5px;margin-bottom:6px}
  .card-cognition{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.15);color:#7c6aaf}
  .card-cognition::before{content:'🧠 ';font-size:12px}
  .card-usage{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);color:#3a8ba8}
  .card-usage::before{content:'🎬 ';font-size:12px}
  .card-recipe{background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.15);color:#b0608a}
  .card-recipe::before{content:'🧩 ';font-size:12px}

  /* Upload */
  .card-media{margin-bottom:10px}
  .upload-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border:1px dashed #ccc;border-radius:6px;font-size:11px;color:#aaa;cursor:pointer;background:none}
  .upload-btn:hover{border-color:#999;color:#666}
  .upload-btn input[type=file]{display:none}
  .video-gallery{display:flex;gap:10px;margin-top:8px;overflow-x:auto;padding-bottom:4px}
  .video-gallery::-webkit-scrollbar{height:4px}
  .video-gallery::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
  .video-thumb{position:relative;min-width:160px;width:160px;height:100px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid #e8e8ee;transition:all .2s;flex-shrink:0;background:#f0f0f4}
  .video-thumb:hover{border-color:#ccc;transform:scale(1.03)}
  .video-thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
  .video-thumb .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .video-thumb .play-icon::after{content:'';width:0;height:0;border-style:solid;border-width:6px 0 6px 10px;border-color:transparent transparent transparent #fff;margin-left:2px}
  .video-thumb .delete-btn{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(239,68,68,.85);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
  .video-thumb:hover .delete-btn{display:flex}
  .video-thumb .vid-label{position:absolute;bottom:0;left:0;right:0;font-size:9px;color:#ccc;background:rgba(0,0,0,.7);padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Tags */
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
  .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
  .tag-green{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2)}
  .tag-amber{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.2)}
  .tag-blue{background:rgba(96,165,250,.1);color:#2563eb;border:1px solid rgba(96,165,250,.2)}
  .tag-gray{background:rgba(0,0,0,.03);color:#888;border:1px solid rgba(0,0,0,.06)}
  .tag-purple{background:rgba(167,139,250,.1);color:#7c3aed;border:1px solid rgba(167,139,250,.2)}
  .tag-pink{background:rgba(244,114,182,.1);color:#db2777;border:1px solid rgba(244,114,182,.2)}

  /* Section color themes */
  [data-color=green] .group-line{background:#22c55e}
  [data-color=green] .section-icon{background:rgba(34,197,94,.1)}
  [data-color=green] .section-title{color:#16a34a}
  [data-color=green] .section-tag{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2)}
  [data-color=green] .card::before{background:#22c55e}

  [data-color=teal] .section-icon{background:rgba(45,212,191,.1)}
  [data-color=teal] .section-title{color:#0d9488}
  [data-color=teal] .section-tag{background:rgba(45,212,191,.1);color:#0d9488;border:1px solid rgba(45,212,191,.2)}
  [data-color=teal] .card::before{background:#2dd4bf}

  [data-color=sky] .section-icon{background:rgba(56,189,248,.1)}
  [data-color=sky] .section-title{color:#0284c7}
  [data-color=sky] .section-tag{background:rgba(56,189,248,.1);color:#0284c7;border:1px solid rgba(56,189,248,.2)}
  [data-color=sky] .card::before{background:#38bdf8}

  [data-color=indigo] .section-icon{background:rgba(129,140,248,.1)}
  [data-color=indigo] .section-title{color:#4f46e5}
  [data-color=indigo] .section-tag{background:rgba(129,140,248,.1);color:#4f46e5;border:1px solid rgba(129,140,248,.2)}
  [data-color=indigo] .card::before{background:#818cf8}

  [data-color=purple] .section-icon{background:rgba(167,139,250,.1)}
  [data-color=purple] .section-title{color:#7c3aed}
  [data-color=purple] .section-tag{background:rgba(167,139,250,.1);color:#7c3aed;border:1px solid rgba(167,139,250,.2)}
  [data-color=purple] .card::before{background:#a78bfa}

  [data-color=orange] .section-icon{background:rgba(249,115,22,.1)}
  [data-color=orange] .section-title{color:#ea580c}
  [data-color=orange] .section-tag{background:rgba(249,115,22,.1);color:#ea580c;border:1px solid rgba(249,115,22,.2)}
  [data-color=orange] .card::before{background:#f97316}

  [data-color=amber] .section-icon{background:rgba(251,191,36,.1)}
  [data-color=amber] .section-title{color:#d97706}
  [data-color=amber] .section-tag{background:rgba(251,191,36,.1);color:#d97706;border:1px solid rgba(251,191,36,.2)}
  [data-color=amber] .card::before{background:#f59e0b}

  [data-color=rose] .section-icon{background:rgba(251,113,133,.1)}
  [data-color=rose] .section-title{color:#e11d48}
  [data-color=rose] .section-tag{background:rgba(251,113,133,.1);color:#e11d48;border:1px solid rgba(251,113,133,.2)}
  [data-color=rose] .card::before{background:#fb7185}

  [data-color=pink] .section-icon{background:rgba(244,114,182,.1)}
  [data-color=pink] .section-title{color:#db2777}
  [data-color=pink] .section-tag{background:rgba(244,114,182,.1);color:#db2777;border:1px solid rgba(244,114,182,.2)}
  [data-color=pink] .card::before{background:#f472b6}

  [data-color=fuchsia] .section-icon{background:rgba(192,132,252,.1)}
  [data-color=fuchsia] .section-title{color:#9333ea}
  [data-color=fuchsia] .section-tag{background:rgba(192,132,252,.1);color:#9333ea;border:1px solid rgba(192,132,252,.2)}
  [data-color=fuchsia] .card::before{background:#c084fc}

  /* Group headers within a section */
  .group-header{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:14px 0 4px;margin-top:12px;border-top:1px solid #eee}
  .group-line{width:4px;height:22px;border-radius:2px;flex-shrink:0}
  .group-label{font-size:15px;font-weight:700;color:#333}
  .group-sublabel{font-size:11px;color:#aaa;font-weight:400;margin-left:4px}
  .parent-card{grid-column:1/-1;border:1.5px solid rgba(0,0,0,.08);background:linear-gradient(135deg,#fafafe,#f5f5ff);display:grid;grid-template-columns:1fr 1fr;gap:0 28px;padding:24px 28px}
  .parent-card .card-name{font-size:20px;grid-column:1;margin-bottom:4px}
  .parent-card .card-name-en{grid-column:1}
  .parent-card .card-desc{grid-column:1}
  .parent-card .card-example{grid-column:1}
  .parent-card .card-extra{grid-column:2}
  .parent-card .card-extra:first-of-type{margin-top:0}
  .parent-card .card-media{grid-column:2}
  .parent-card .card-tags{grid-column:1/-1}

  /* Matrix */
  .matrix-wrap{padding:0 20px 40px}
  .matrix-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px;color:#1a1a2e}
  .matrix{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
  .matrix th{padding:10px 8px;background:#f0f0f5;border:1px solid #e0e0e8;font-weight:600;color:#666;text-align:center}
  .matrix td{padding:8px;border:1px solid #e0e0e8;text-align:center;color:#888;vertical-align:middle;line-height:1.5}
  .matrix td.hi{background:rgba(124,58,237,.06);color:#7c3aed}
  .matrix td.med{background:rgba(0,0,0,.02);color:#888}
  .matrix td.lo{color:#bbb}
  .matrix .row-label{background:#f5f5f8;font-weight:600;color:#666;text-align:left;padding-left:12px;width:100px}
  .matrix-note{font-size:11px;color:#999;text-align:center;margin-top:10px}

  /* Summary */
  .summary{padding:20px 20px 60px}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .summary-card{background:#fff;border:1px solid #eaeaf0;border-radius:10px;padding:20px;text-align:center}
  .summary-number{font-size:32px;font-weight:900;margin-bottom:2px}
  .summary-label{font-size:12px;color:#555}

  /* Modal */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.active{display:flex}
  .modal-content{position:relative;max-width:900px;width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee}
  .modal-title{font-size:13px;font-weight:600;color:#333}
  .modal-close{width:26px;height:26px;background:rgba(0,0,0,.05);border:none;border-radius:6px;color:#888;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{background:rgba(0,0,0,.1);color:#333}
  .modal-body{padding:0;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
  .modal-body video{max-width:100%;max-height:70vh;outline:none}
  .modal-play-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;background:rgba(0,0,0,.3);transition:opacity .2s}
  .modal-play-overlay.hidden{opacity:0;pointer-events:none}
  .modal-play-btn{width:56px;height:56px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:transform .15s,background .15s}
  .modal-play-overlay:hover .modal-play-btn{transform:scale(1.1);background:rgba(255,255,255,.25)}
  .modal-play-btn::after{content:'';width:0;height:0;border-style:solid;border-width:10px 0 10px 18px;border-color:transparent transparent transparent #fff;margin-left:3px}
  .modal-footer{padding:8px 16px;border-top:1px solid #eee;font-size:11px;color:#888;display:flex;justify-content:space-between;align-items:center}
  .modal-nav{display:flex;gap:6px}
  .modal-nav button{padding:3px 10px;background:rgba(0,0,0,.04);border:1px solid #ddd;border-radius:4px;color:#888;font-size:11px;cursor:pointer}
  .modal-nav button:hover{background:rgba(0,0,0,.08);color:#333}
  .modal-nav button:disabled{opacity:.3;cursor:not-allowed}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#333;padding:8px 20px;border-radius:8px;font-size:12px;z-index:2000;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;border:1px solid #e0e0e8;box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .footer{text-align:center;padding:30px 20px;border-top:1px solid #e8e8ee;color:#ccc;font-size:11px}

  /* Mobile nav */
  .mobile-bar{display:none;position:sticky;top:0;z-index:200;background:rgba(245,245,248,.95);backdrop-filter:blur(10px);border-bottom:1px solid #e8e8ee;padding:10px 16px;align-items:center;justify-content:space-between}
  .mobile-bar-title{font-size:14px;font-weight:700;color:#1a1a2e}
  .mobile-bar-btn{padding:6px 14px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:12px;color:#666;cursor:pointer}
  .mobile-bar-btn:active{background:#f0f0f0}
  .mobile-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:rgba(0,0,0,.4)}
  .mobile-menu.open{display:block}
  .mobile-menu-panel{position:absolute;top:0;right:0;width:280px;height:100%;background:#fafafa;overflow-y:auto;padding:16px 0;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
  .mobile-menu-close{display:flex;justify-content:flex-end;padding:0 16px 12px}
  .mobile-menu-close button{width:32px;height:32px;border:none;background:rgba(0,0,0,.05);border-radius:6px;font-size:18px;color:#999;cursor:pointer}
  .mobile-menu .sb-part{padding:14px 16px 4px;font-size:11px;font-weight:700;letter-spacing:1px;color:#aaa}
  .mobile-menu .sb-link{display:block;padding:8px 16px 8px 28px;color:#666;font-size:13px;text-decoration:none;cursor:pointer;border-left:2px solid transparent}
  .mobile-menu .sb-link.active{color:#7c3aed;border-left-color:#7c3aed;background:rgba(124,58,237,.04)}
  .mobile-menu .sb-sub{padding-left:40px;font-size:12px;color:#999}

  @media(max-width:900px){
    .sidebar{display:none}
    .layout{display:block}
    .mobile-bar{display:flex}
    .header{padding:32px 16px 8px}
    .header h1{font-size:28px}
    .part{padding:28px 16px 16px}
    .section{padding:0 12px 20px}
    .cards{grid-template-columns:1fr}
    .parent-card{grid-template-columns:1fr;padding:18px}
    .matrix{font-size:10px}
  }
</style>

<body>

<div class="header">
  <h1>镜头语言全图鉴</h1>
  <div class="subtitle">CINEMATIC LANGUAGE &mdash; COMPLETE REFERENCE</div>
</div>

<div class="mobile-bar">
  <span class="mobile-bar-title">镜头语言全图鉴</span>
  <button class="mobile-bar-btn" onclick="document.getElementById('mobileMenu').classList.add('open')">☰ 目录</button>
</div>
<div class="mobile-menu" id="mobileMenu" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="mobile-menu-panel" id="mobileMenuPanel">
    <div class="mobile-menu-close"><button onclick="document.getElementById('mobileMenu').classList.remove('open')">&times;</button></div>
  </div>
</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="content" id="app"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="videoModal">
  <div class="modal-content">
    <div class="modal-header"><span class="modal-title" id="modalTitle"></span><button class="modal-close" id="modalClose">&times;</button></div>
    <div class="modal-body"><video id="modalVideo" controls></video><div class="modal-play-overlay" id="modalPlayOverlay"><div class="modal-play-btn"></div></div></div>
    <div class="modal-footer"><span id="modalInfo"></span><div class="modal-nav"><button id="modalPrev">&larr;</button><button id="modalNext">&rarr;</button></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================
const PARTS = [
{
  id:'part1', num:'PART 1', title:'单镜头语言', titleColor:'#4ade80',
  desc:'一个连续不中断的镜头内部，摄影机如何表达 —— 从开机到关机之间的所有可能性',
  sections:[
    { color:'green', icon:'\u2794', title:'运镜 · 位移类', subtitle:'Camera Translation', tag:'摄影机整体移动',
      cards:[
        {id:'push-in',name:'推',en:'Dolly In / Push In',desc:'摄影机向被摄主体移动。引导注意力、强调细节、制造压迫感或亲密感。',example:'慢推到角色面部特写 — 暗示角色做出了某个重要决定',cognition:'模拟人靠近物体的视觉变化，激活注意力聚焦机制。大脑将"靠近"解读为"重要/需关注"',usage:'角色做关键决定、揭示重要信息、制造压迫感/亲密感',tags:['tag-green:拍摄','tag-gray:滑轨/稳定器','tag-gray:★ 入门']},
        {id:'pull-out',name:'拉',en:'Dolly Out / Pull Out',desc:'摄影机远离被摄主体。揭示环境全貌、制造孤独/渺小感、从局部退回全局。',example:'从角色特写拉到远景 — 揭示角色独自站在空旷的荒野中',cognition:'模拟后退时的视觉，激活全局感知模式。远离=脱离，触发旁观者心态',usage:'段落结尾揭示全貌、表达角色孤独/渺小、从细节退回宏观',tags:['tag-green:拍摄','tag-gray:滑轨/稳定器','tag-gray:★ 入门']},

// IndexedDB
// ============================================================
const DB_NAME='CinematicVideos',DB_VER=1,STORE='videos';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE)){const s=d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});s.createIndex('cardId','cardId',{unique:false})}};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=e=>rej(e)})}
function dbAdd(cid,f){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).add({cardId:cid,name:f.name,type:f.type,size:f.size,blob:f,ts:Date.now()});r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbGetByCard(cid){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readonly').objectStore(STORE).index('cardId').getAll(cid);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbDelete(id){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);r.onsuccess=()=>res();r.onerror=e=>rej(e)})}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}

  const mobilePanel=document.getElementById('mobileMenuPanel');
  const closeBtn=mobilePanel.querySelector('.mobile-menu-close').outerHTML;
  const mobileLinks=sidebarHtml.replace(/onclick="[^"]*"/g,(m)=>{
    return m.replace('")',';document.getElementById(\'mobileMenu\').classList.remove(\'open\')")');
  });
  mobilePanel.innerHTML=closeBtn+mobileLinks;

  // IntersectionObserver for sidebar highlight
  const secObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
        const link=document.querySelector(`.sb-link[data-target="${e.target.id}"]`);
        if(link){
          link.classList.add('active');
          link.scrollIntoView({block:'nearest',behavior:'smooth'});
        }
      }
    });
  },{threshold:0.1,rootMargin:'-10% 0px -80% 0px'});

  document.querySelectorAll('.section, .matrix-wrap, .group-header').forEach(el=>{
    if(el.id) secObserver.observe(el);
  });
}

async function handleFiles(cid,files){for(const f of files){if(!f.type.startsWith('video/')){showToast('请上传视频文件');continue}await dbAdd(cid,f)}showToast(`已添加 ${files.length} 个视频`);loadGallery(cid)}
async function loadGallery(cid){const g=document.getElementById(`gallery-${cid}`);if(!g)return;const vs=await dbGetByCard(cid);g.innerHTML='';vs.forEach((v,i)=>{const url=URL.createObjectURL(v.blob);const t=document.createElement('div');t.className='video-thumb';t.innerHTML=`<video src="${url}" preload="metadata" muted></video><div class="play-icon"></div><button class="delete-btn">&times;</button><div class="vid-label">${v.name}</div>`;const vid=t.querySelector('video');vid.addEventListener('loadedmetadata',()=>{vid.currentTime=Math.min(1,vid.duration*.1)});t.addEventListener('click',e=>{if(e.target.classList.contains('delete-btn'))return;openModal(cid,i)});t.querySelector('.delete-btn').addEventListener('click',async e=>{e.stopPropagation();await dbDelete(v.id);URL.revokeObjectURL(url);showToast('已删除');loadGallery(cid)});g.appendChild(t)})}

// Modal
let ms={cardId:null,index:0,videos:[]};
async function openModal(cid,i){const vs=await dbGetByCard(cid);if(!vs.length)return;ms={cardId:cid,index:i,videos:vs};showMV();document.getElementById('videoModal').classList.add('active')}
function showMV(){const{index:i,videos:vs,cardId:cid}=ms;const v=vs[i];const vid=document.getElementById('modalVideo');let name=cid;PARTS.forEach(p=>p.sections.forEach(s=>{if(s.cards)s.cards.forEach(c=>{if(c.id===cid)name=c.name});if(s.parent&&s.parent.id===cid)name=s.parent.name;if(s.groups)s.groups.forEach(g=>g.cards.forEach(c=>{if(c.id===cid)name=c.name}))}));if(vid._u)URL.revokeObjectURL(vid._u);const u=URL.createObjectURL(v.blob);vid._u=u;vid.src=u;vid.load();document.getElementById('modalPlayOverlay').classList.remove('hidden');document.getElementById('modalTitle').textContent=`${name} — ${v.name}`;document.getElementById('modalInfo').textContent=`${i+1}/${vs.length} · ${fmtSize(v.size)}`;document.getElementById('modalPrev').disabled=i===0;document.getElementById('modalNext').disabled=i===vs.length-1}
function closeModal(){const v=document.getElementById('modalVideo');v.pause();if(v._u){URL.revokeObjectURL(v._u);v._u=null}v.removeAttribute('src');v.load();document.getElementById('videoModal').classList.remove('active')}

document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('videoModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('modalPlayOverlay').addEventListener('click',()=>{const v=document.getElementById('modalVideo');v.muted=false;v.volume=1;v.currentTime=0;const p=v.play();if(p&&p.catch)p.catch(()=>{v.muted=true;v.play();showToast('请点击喇叭图标取消静音')});document.getElementById('modalPlayOverlay').classList.add('hidden')});
document.getElementById('modalVideo').addEventListener('ended',()=>document.getElementById('modalPlayOverlay').classList.remove('hidden'));
document.getElementById('modalVideo').addEventListener('play',()=>document.getElementById('modalPlayOverlay').classList.add('hidden'));
document.getElementById('modalPrev').addEventListener('click',()=>{if(ms.index>0){ms.index--;showMV()}});
document.getElementById('modalNext').addEventListener('click',()=>{if(ms.index<ms.videos.length-1){ms.index++;showMV()}});
document.addEventListener('keydown',e=>{if(!document.getElementById('videoModal').classList.contains('active'))return;if(e.key==='Escape')closeModal();if(e.key==='ArrowLeft'&&ms.index>0){ms.index--;showMV()}if(e.key==='ArrowRight'&&ms.index<ms.videos.length-1){ms.index++;showMV()}});

(async()=>{await openDB();render();PARTS.forEach(p=>p.sections.forEach(s=>{if(s.groups){if(s.parent)loadGallery(s.parent.id);s.groups.forEach(g=>g.cards.forEach(c=>loadGallery(c.id)))}else if(s.cards){s.cards.forEach(c=>loadGallery(c.id))}}))})();
</script>
